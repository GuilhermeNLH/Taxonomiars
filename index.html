<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxonomy Map Builder — TRM/UFRJ</title>
<style>
:root {
  --bg:#1a1a2e; --surface:#16213e; --surface2:#0f3460;
  --accent:#e94560; --accent2:#f5a623;
  --text:#eaeaea; --text2:#a0aec0; --border:#2d3748;
  --radius:8px; --shadow:0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
header h1{font-size:15px;font-weight:700;color:var(--accent)}
.pill{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.spacer{flex:1}
.hbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--radius);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.hbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.layout{display:flex;flex:1;overflow:hidden}
aside{width:295px;min-width:295px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.aside-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.atab{flex:1;padding:9px 4px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s}
.atab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(233,69,96,.06)}
.aside-body{flex:1;overflow-y:auto;padding:12px}
.aside-body::-webkit-scrollbar{width:3px}
.aside-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.field{margin-bottom:10px}
label{display:block;font-size:10px;font-weight:700;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],textarea,select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 9px;border-radius:var(--radius);font-size:12px;outline:none;transition:border-color .15s;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:48px}
input[type=range]{width:100%;accent-color:var(--accent)}
.sec{font-size:10px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin:14px 0 7px;border-bottom:1px solid var(--border);padding-bottom:5px}
.btn{width:100%;padding:8px;border-radius:var(--radius);border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:7px;font-family:inherit}
.b-add{background:var(--accent);color:#fff}.b-add:hover{background:#c23050}
.b-meso{background:#3a6a8a;color:#fff}.b-meso:hover{background:#4a8aaa}
.b-micro{background:#2a6a3a;color:#fff}.b-micro:hover{background:#3a8a4a}
.b-art{background:#7a6a00;color:#fff}.b-art:hover{background:#9a8a00}
.b-del{background:#2d1a1a;color:#e57373;border:1px solid #e57373}.b-del:hover{background:#e57373;color:#fff}
.b-cancel{background:var(--bg);color:var(--text2);border:1px solid var(--border)}.b-cancel:hover{color:var(--text)}
.b-save{background:var(--accent);color:#fff}
.cswatches{display:flex;gap:5px;flex-wrap:wrap}
.csw{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.csw.sel,.csw:hover{border-color:#fff;transform:scale(1.15)}
.node-list{display:flex;flex-direction:column;gap:5px}
.ni{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px 9px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.ni:hover{border-color:var(--accent);background:rgba(233,69,96,.08)}
.ni-label{font-size:12px;font-weight:600}
.ni-sub{font-size:10px;color:var(--text2);margin-top:1px}
.badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap}
.bc{background:#CC2200;color:#fff}.bm{background:#3a6a8a;color:#fff}.bmi{background:#2a6a3a;color:#fff}.ba{background:#7a6a00;color:#fff}
.xbtn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px;line-height:1}
.xbtn:hover{background:rgba(229,115,115,.15);color:#e57373}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#e8e8e2;cursor:grab}
.canvas-wrap:active{cursor:grabbing}
#main-svg{display:block;width:100%;height:100%}
#zoom-info{position:absolute;bottom:10px;left:10px;font-size:10px;color:var(--text2);background:var(--surface);padding:3px 9px;border-radius:20px;border:1px solid var(--border);pointer-events:none}
.ctools{position:absolute;top:10px;right:10px;display:flex;gap:5px}
.ct{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;user-select:none}
.ct:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal h2{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--accent)}
.mactions{display:flex;gap:7px;margin-top:14px}
.mactions .btn{margin:0;flex:1}
#toast{position:fixed;bottom:18px;right:18px;background:var(--surface2);color:#fff;padding:9px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;border-left:3px solid var(--accent)}
#toast.show{opacity:1}
.tab-panel{display:none}.tab-panel.active{display:block}
</style>
</head>
<body>
<header>
  <h1>🗺 Taxonomy Map Builder</h1>
  <span class="pill">TRM · UFRJ</span>
  <div class="spacer"></div>
  <button class="hbtn" onclick="exportSVG()">⬇ SVG</button>
  <button class="hbtn" onclick="exportHTML()">⬇ HTML</button>
  <button class="hbtn" onclick="exportJSON()">⬇ JSON</button>
  <button class="hbtn" onclick="document.getElementById('import-file').click()">⬆ Importar</button>
  <button class="hbtn primary" onclick="document.getElementById('newmap-modal').classList.add('open')">＋ Novo Mapa</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
</header>

<div class="layout">
<aside>
  <div class="aside-tabs">
    <div class="atab active" onclick="switchTab('add')" id="tab-add">Adicionar</div>
    <div class="atab" onclick="switchTab('nodes')" id="tab-nodes">Nós</div>
    <div class="atab" onclick="switchTab('cfg')" id="tab-cfg">Configurar</div>
  </div>

  <div class="aside-body tab-panel active" id="panel-add">
    <div class="sec">Nó Central</div>
    <div class="field"><label>Tema</label><input type="text" id="central-text" value="Membranas Poliméricas"></div>
    <div class="field"><label>Subtítulo</label><input type="text" id="central-sub" value="Alta Seletividade CO₂"></div>
    <button class="btn b-add" onclick="updateCentral()">✔ Atualizar Central</button>

    <div class="sec">Driver Meso</div>
    <div class="field"><label>Nome</label><input type="text" id="meso-name" placeholder="Ex: Material, Processo..."></div>
    <div class="field"><label>Descrição</label><input type="text" id="meso-desc" placeholder="opcional"></div>
    <div class="field"><label>Cor</label>
      <div class="cswatches" id="meso-swatches">
        <div class="csw sel" style="background:#A8C4D8" data-c="#A8C4D8" onclick="pickColor(this,'meso')"></div>
        <div class="csw" style="background:#C8A4D8" data-c="#C8A4D8" onclick="pickColor(this,'meso')"></div>
        <div class="csw" style="background:#A4D8B4" data-c="#A4D8B4" onclick="pickColor(this,'meso')"></div>
        <div class="csw" style="background:#D8C8A4" data-c="#D8C8A4" onclick="pickColor(this,'meso')"></div>
        <div class="csw" style="background:#D8A4A4" data-c="#D8A4A4" onclick="pickColor(this,'meso')"></div>
        <div class="csw" style="background:#A4C8D8" data-c="#A4C8D8" onclick="pickColor(this,'meso')"></div>
        <div class="csw" style="background:#D4D8A4" data-c="#D4D8A4" onclick="pickColor(this,'meso')"></div>
        <div class="csw" style="background:#D8B4C4" data-c="#D8B4C4" onclick="pickColor(this,'meso')"></div>
      </div>
    </div>
    <button class="btn b-meso" onclick="addMeso()">＋ Adicionar Driver Meso</button>

    <div class="sec">Taxonomia Micro</div>
    <div class="field"><label>Driver Pai</label><select id="micro-parent"></select></div>
    <div class="field"><label>Nome</label><input type="text" id="micro-name" placeholder="Ex: Poliimida, Pós-combustão..."></div>
    <button class="btn b-micro" onclick="addMicro()">＋ Adicionar Micro</button>

    <div class="sec">Artigo de Referência</div>
    <div class="field"><label>Driver Pai</label><select id="art-parent"></select></div>
    <div class="field"><label>Referência</label><input type="text" id="art-ref" placeholder="Ex: Han &amp; Ho (2021)"></div>
    <div class="field"><label>Periódico</label><input type="text" id="art-journal" placeholder="J. Membr. Sci. 628, 119244"></div>
    <div class="field"><label>DOI / URL</label><input type="text" id="art-doi" placeholder="https://doi.org/..."></div>
    <button class="btn b-art" onclick="addArticle()">＋ Adicionar Artigo</button>
  </div>

  <div class="aside-body tab-panel" id="panel-nodes">
    <div id="node-list" class="node-list"></div>
  </div>

  <div class="aside-body tab-panel" id="panel-cfg">
    <div class="sec">Texto</div>
    <div class="field"><label>Título</label><input type="text" id="map-title" value="Taxonomias (Drivers)" oninput="render()"></div>
    <div class="field"><label>Subtítulo</label><input type="text" id="map-subtitle" value="Technology Roadmap · UFRJ" oninput="render()"></div>
    <div class="field"><label>Query Scopus</label><textarea id="map-query" oninput="render()">("Polymeric membrane*" OR "polymer membrane*") AND ("CO2 capture" OR "carbon dioxide separation*") AND (gas separation)</textarea></div>
    <div class="sec">Espaçamento</div>
    <div class="field"><label>Gap entre grupos: <span id="vgap-val">20</span>px</label>
      <input type="range" id="vgap" min="4" max="80" value="20" oninput="document.getElementById('vgap-val').textContent=this.value;render()">
    </div>
    <div class="field"><label>Gap entre micros: <span id="mgap-val">8</span>px</label>
      <input type="range" id="mgap" min="2" max="24" value="8" oninput="document.getElementById('mgap-val').textContent=this.value;render()">
    </div>
    <div class="field"><label>Mostrar artigos</label>
      <select id="show-arts" onchange="render()"><option value="1">Sim</option><option value="0">Não</option></select>
    </div>
    <div class="sec">Modelos</div>
    <button class="btn b-meso" onclick="loadEx('membranas')">📄 Membranas CO₂</button>
    <button class="btn b-meso" onclick="loadEx('biogas')">📄 Biometanização da Palha</button>
    <button class="btn b-micro" onclick="loadEx('blank')">🗒 Mapa em Branco</button>
  </div>
</aside>

<div class="canvas-wrap" id="cwrap">
  <svg id="main-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="zoom-info">zoom: 100%</div>
  <div class="ctools">
    <div class="ct" onclick="doZoom(1.2)">＋</div>
    <div class="ct" onclick="doZoom(1/1.2)">－</div>
    <div class="ct" onclick="resetView()">⊡</div>
    <div class="ct" onclick="fitAll()">⤢</div>
  </div>
</div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h2 id="modal-ttl">Editar Nó</h2>
    <input type="hidden" id="eid">
    <div class="field"><label>Nome / Texto</label><input type="text" id="ename"></div>
    <div class="field" id="f-desc"><label>Descrição</label><input type="text" id="edesc"></div>
    <div class="field" id="f-journal"><label>Periódico</label><input type="text" id="ejournal"></div>
    <div class="field" id="f-doi"><label>DOI / URL</label><input type="text" id="edoi"></div>
    <div class="field" id="f-color"><label>Cor</label>
      <div class="cswatches" id="edit-swatches">
        <div class="csw" style="background:#A8C4D8" data-c="#A8C4D8" onclick="pickColor(this,'edit')"></div>
        <div class="csw" style="background:#C8A4D8" data-c="#C8A4D8" onclick="pickColor(this,'edit')"></div>
        <div class="csw" style="background:#A4D8B4" data-c="#A4D8B4" onclick="pickColor(this,'edit')"></div>
        <div class="csw" style="background:#D8C8A4" data-c="#D8C8A4" onclick="pickColor(this,'edit')"></div>
        <div class="csw" style="background:#D8A4A4" data-c="#D8A4A4" onclick="pickColor(this,'edit')"></div>
        <div class="csw" style="background:#A4C8D8" data-c="#A4C8D8" onclick="pickColor(this,'edit')"></div>
        <div class="csw" style="background:#D4D8A4" data-c="#D4D8A4" onclick="pickColor(this,'edit')"></div>
        <div class="csw" style="background:#D8B4C4" data-c="#D8B4C4" onclick="pickColor(this,'edit')"></div>
      </div>
    </div>
    <div class="field" id="f-parent"><label>Driver Pai</label><select id="eparent"></select></div>
    <div class="mactions">
      <button class="btn b-del" onclick="deleteNode()">🗑 Deletar</button>
      <button class="btn b-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn b-save" onclick="saveEdit()">✔ Salvar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="newmap-modal">
  <div class="modal">
    <h2>Novo Mapa</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:14px">Isso irá apagar o mapa atual.</p>
    <div class="mactions">
      <button class="btn b-cancel" onclick="document.getElementById('newmap-modal').classList.remove('open')">Cancelar</button>
      <button class="btn b-del" onclick="newMap()">🗑 Limpar e Começar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════
// STATE
// ═══════════════════════════════
let S = {
  central: { text:'Membranas Poliméricas', sub:'Alta Seletividade CO₂' },
  mesos: [], micros: [], articles: [], _id: 1
};
let PC = { meso:'#A8C4D8', edit:'#A8C4D8' };
let editId = null;
let vp = { tx:0, ty:0, scale:1 };
let isPan=false, panStart=null;
let contentW=900, contentH=700;

function uid(){ return 'n'+(S._id++) }

// ═══════════════════════════════
// LAYOUT CONSTANTS
// ═══════════════════════════════
// All in SVG user units (pixels at 1:1)
const K = {
  PAD_TOP: 90,    // space for title/query
  PAD_BOT: 36,
  PAD_L:   20,
  // Central node
  CX: 20, CW: 160,
  // Trunk connector elbow gap before meso column
  ELBOW_GAP: 18,
  // Meso column
  MESO_X: 0,  // computed
  MESO_W: 162, MESO_H: 44,
  // Micro column
  MICRO_GAP: 14,   // horizontal gap meso→micro
  MICRO_X: 0,      // computed
  MICRO_W: 150, MICRO_H: 26,
  // Article column
  ART_GAP: 14,
  ART_X: 0,        // computed
  ART_W: 310, ART_H: 32,
};

function initK(){
  K.MESO_X  = K.CX + K.CW + K.ELBOW_GAP;
  K.MICRO_X = K.MESO_X + K.MESO_W + K.MICRO_GAP;
  K.ART_X   = K.MICRO_X + K.MICRO_W + K.ART_GAP;
}

// ═══════════════════════════════
// TREE LAYOUT ENGINE
// Computes Y position for every meso group so nothing overlaps.
// Each group's height = max(MESO_H, microStackH, artStackH)
// Groups are stacked top-to-bottom with GROUP_GAP between them.
// Central node is centred across all groups.
// ═══════════════════════════════
function computeLayout() {
  initK();
  const showArts = document.getElementById('show-arts').value === '1';
  const GROUP_GAP  = parseInt(document.getElementById('vgap').value)  || 20;
  const MICRO_VGAP = parseInt(document.getElementById('mgap').value)  || 8;
  const ART_VGAP   = 8;

  const groups = S.mesos.map(meso => {
    const micros = S.micros.filter(m => m.parent === meso.id);
    const arts   = showArts ? S.articles.filter(a => a.parent === meso.id) : [];

    // height each column occupies
    const microStackH = micros.length > 0
      ? micros.length * K.MICRO_H + (micros.length - 1) * MICRO_VGAP
      : 0;
    const artStackH = arts.length > 0
      ? arts.length * K.ART_H + (arts.length - 1) * ART_VGAP
      : 0;

    const groupH = Math.max(K.MESO_H, microStackH, artStackH, 4);
    return { meso, micros, arts, groupH, microStackH, artStackH, MICRO_VGAP, ART_VGAP };
  });

  // assign Y to each group
  let curY = K.PAD_TOP;
  groups.forEach(g => {
    g.groupY = curY;
    // meso box: vertically centred in group
    g.mesoBoxY = curY + (g.groupH - K.MESO_H) / 2;
    // micro stack: vertically centred
    g.microsY  = curY + (g.groupH - g.microStackH) / 2;
    // art stack: vertically centred
    g.artsY    = curY + (g.groupH - g.artStackH) / 2;
    curY += g.groupH + GROUP_GAP;
  });

  const totalContentH = curY - GROUP_GAP + K.PAD_BOT;
  const totalContentW = K.ART_X + K.ART_W + 24;

  // central node height
  const CH = S.central.sub ? 68 : 52;
  // central node centred across all group rows
  const groupsSpan = groups.length > 0
    ? (groups[groups.length-1].groupY + groups[groups.length-1].groupH) - groups[0].groupY
    : K.MESO_H;
  const centralY = K.PAD_TOP + groupsSpan / 2 - CH / 2;

  return { groups, totalContentH, totalContentW, centralY, CH };
}

// ═══════════════════════════════
// RENDER
// ═══════════════════════════════
function render() {
  const svg    = document.getElementById('main-svg');
  const title  = document.getElementById('map-title').value;
  const sub    = document.getElementById('map-subtitle').value;
  const query  = document.getElementById('map-query').value;
  const showArts = document.getElementById('show-arts').value === '1';

  const layout = computeLayout();
  const { groups, totalContentH, totalContentW, centralY, CH } = layout;
  contentW = totalContentW;
  contentH = totalContentH;

  const W = totalContentW, H = totalContentH;
  const els = [];

  // ── DEFS (arrow markers) ──────────────────────────
  els.push(`<defs>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 2L8 5L1 8" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
    <marker id="am2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2L8 5L1 8" fill="none" stroke="#4a8aaa" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>`);

  // ── BACKGROUND ───────────────────────────────────
  els.push(`<rect width="${W}" height="${H}" fill="#f0efe8"/>`);

  // ── TITLE / QUERY BAR ────────────────────────────
  els.push(`<text x="${W/2}" y="26" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#CC2200">${esc(title)}</text>`);
  if (sub)
    els.push(`<text x="${W/2}" y="44" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">${esc(sub)}</text>`);
  if (query) {
    els.push(`<rect x="36" y="52" width="${W-72}" height="22" rx="5" fill="white" stroke="#ccc" stroke-width="0.8"/>`);
    els.push(`<text x="${W/2}" y="66" text-anchor="middle" font-family="Arial" font-size="8.5" fill="#888" font-style="italic">${esc(query)}</text>`);
  }

  // ── CENTRAL NODE ─────────────────────────────────
  const cx = K.CX, cw = K.CW;
  const cy = centralY;
  els.push(`<rect x="${cx}" y="${cy}" width="${cw}" height="${CH}" rx="10" fill="#CC2200" stroke="#8B0000" stroke-width="2" class="svgn" data-id="__central"/>`);
  const cTextLines = wrapText(S.central.text, 17);
  const cLineH = 15;
  const cTextTotalH = cTextLines.length * cLineH;
  // position text block centred, leaving room for sub
  const cTextTopY = cy + (S.central.sub
    ? (CH - cTextTotalH - 14) / 2 + cLineH
    : (CH - cTextTotalH) / 2 + cLineH);
  cTextLines.forEach((line, i) => {
    els.push(`<text x="${cx+cw/2}" y="${cTextTopY + i*cLineH}" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">${esc(line)}</text>`);
  });
  if (S.central.sub) {
    els.push(`<text x="${cx+cw/2}" y="${cy+CH-9}" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#FFD0CC">${esc(S.central.sub)}</text>`);
  }

  const centralMidY = cy + CH / 2;
  const elbowX = K.MESO_X - 8; // shared elbow column X for trunks

  // ── GROUPS ───────────────────────────────────────
  groups.forEach(g => {
    const { meso, micros, arts, mesoBoxY, microsY, artsY, MICRO_VGAP, ART_VGAP } = g;
    const mx = K.MESO_X, mw = K.MESO_W, mh = K.MESO_H;
    const mesoMidY = mesoBoxY + mh / 2;
    const mborder  = colorDarken(meso.color, 60);
    const mtextCol = colorText(meso.color);

    // ── TRUNK: central → meso (elbow routing) ──────
    // right edge of central → elbow col → meso left edge
    els.push(`<path d="M${cx+cw} ${centralMidY} H${elbowX} V${mesoMidY} H${mx}" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#am)"/>`);

    // ── MESO BOX ────────────────────────────────────
    els.push(`<rect x="${mx}" y="${mesoBoxY}" width="${mw}" height="${mh}" rx="7" fill="${meso.color}" stroke="${mborder}" stroke-width="1.2" class="svgn" data-id="${meso.id}"/>`);
    const mlines = wrapText(meso.name, 22);
    const mlH = 13;
    const mTextH = mlines.length * mlH + (meso.desc ? 12 : 0);
    let mty = mesoBoxY + (mh - mTextH) / 2 + mlH;
    mlines.forEach((line, i) => {
      els.push(`<text x="${mx+mw/2}" y="${mty+i*mlH}" text-anchor="middle" font-family="Arial" font-size="11.5" font-weight="bold" fill="${mtextCol}">${esc(line)}</text>`);
    });
    if (meso.desc) {
      els.push(`<text x="${mx+mw/2}" y="${mesoBoxY+mh-7}" text-anchor="middle" font-family="Arial" font-size="8" fill="${colorDarken(mtextCol,30)}" font-style="italic">${esc(meso.desc)}</text>`);
    }

    // ── MICROS ──────────────────────────────────────
    if (micros.length > 0) {
      const microElbowX = K.MICRO_X - 8;
      micros.forEach((mc, i) => {
        const mry    = microsY + i * (K.MICRO_H + MICRO_VGAP);
        const mrMidY = mry + K.MICRO_H / 2;
        // elbow: meso right → microElbowX → micro left
        els.push(`<path d="M${mx+mw} ${mesoMidY} H${microElbowX} V${mrMidY} H${K.MICRO_X}" fill="none" stroke="${mborder}" stroke-width="1.1" marker-end="url(#am2)"/>`);
        els.push(`<rect x="${K.MICRO_X}" y="${mry}" width="${K.MICRO_W}" height="${K.MICRO_H}" rx="5" fill="#C8E6C0" stroke="#5A9950" stroke-width="0.8" class="svgn" data-id="${mc.id}"/>`);
        const mclines = wrapText(mc.name, 24);
        const mclH    = 11;
        const mcTextH = mclines.length * mclH;
        const mcts    = mry + (K.MICRO_H - mcTextH) / 2 + mclH;
        mclines.forEach((line, li) => {
          els.push(`<text x="${K.MICRO_X+K.MICRO_W/2}" y="${mcts+li*mclH}" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1a4d10">${esc(line)}</text>`);
        });
      });
    }

    // ── ARTICLES ────────────────────────────────────
    if (showArts && arts.length > 0) {
      arts.forEach((art, i) => {
        const ary = artsY + i * (K.ART_H + ART_VGAP);
        els.push(`<rect x="${K.ART_X}" y="${ary}" width="${K.ART_W}" height="${K.ART_H}" rx="5" fill="#FFF3CD" stroke="#C8A400" stroke-width="0.8" class="svgn" data-id="${art.id}"/>`);
        els.push(`<text x="${K.ART_X+K.ART_W/2}" y="${ary+12}" text-anchor="middle" font-family="Arial" font-size="8.5" font-weight="bold" fill="#5c4a00">${esc(art.ref)}</text>`);
        if (art.journal)
          els.push(`<text x="${K.ART_X+K.ART_W/2}" y="${ary+24}" text-anchor="middle" font-family="Arial" font-size="8" fill="#7a6a00">${esc(art.journal)}</text>`);
      });
    }
  });

  // ── LEGEND ───────────────────────────────────────
  const ly = H - 22;
  const legend = [['Tema Central','#CC2200'],['Driver Meso','#A8C4D8'],['Taxonomia Micro','#C8E6C0'],['Artigo Ref.','#FFF3CD']];
  let lx = 20;
  legend.forEach(([label,col]) => {
    els.push(`<rect x="${lx}" y="${ly}" width="11" height="11" rx="2" fill="${col}" stroke="#999" stroke-width="0.8"/>`);
    els.push(`<text x="${lx+15}" y="${ly+9}" font-family="Arial" font-size="8.5" fill="#666">${esc(label)}</text>`);
    lx += 96;
  });
  els.push(`<text x="${W-8}" y="${ly+9}" text-anchor="end" font-family="Arial" font-size="8" fill="#bbb">TaxonomyMapBuilder · TRM/UFRJ</text>`);

  // ── INJECT ───────────────────────────────────────
  svg.setAttribute('width',  W);
  svg.setAttribute('height', H);
  svg.innerHTML = els.join('');

  applyVP();

  // click handlers
  svg.querySelectorAll('.svgn').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', e => { e.stopPropagation(); openEdit(el.dataset.id); });
  });
}

// ═══════════════════════════════
// VIEWPORT
// ═══════════════════════════════
function applyVP(){
  const svg = document.getElementById('main-svg');
  const vbW = contentW / vp.scale;
  const vbH = contentH / vp.scale;
  const vbX = -vp.tx / vp.scale;
  const vbY = -vp.ty / vp.scale;
  svg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
  document.getElementById('zoom-info').textContent = `zoom: ${Math.round(vp.scale*100)}%`;
}

function doZoom(f){
  vp.scale = Math.min(Math.max(vp.scale*f, 0.12), 8);
  applyVP();
}
function resetView(){ vp={tx:0,ty:0,scale:1}; applyVP(); }
function fitAll(){
  const wrap = document.getElementById('cwrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  vp.scale = Math.min(ww/contentW, wh/contentH) * 0.94;
  vp.tx = (ww - contentW*vp.scale)/2;
  vp.ty = (wh - contentH*vp.scale)/2;
  applyVP();
}

const cwrap = document.getElementById('cwrap');
cwrap.addEventListener('mousedown', e => {
  if(e.button===0){ isPan=true; panStart={x:e.clientX,y:e.clientY}; e.preventDefault(); }
});
window.addEventListener('mousemove', e => {
  if(!isPan||!panStart) return;
  vp.tx += e.clientX - panStart.x;
  vp.ty += e.clientY - panStart.y;
  panStart = {x:e.clientX, y:e.clientY};
  applyVP();
});
window.addEventListener('mouseup', () => { isPan=false; });

cwrap.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 1/1.1;
  const rect = cwrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const wx = (mx - vp.tx)/vp.scale, wy = (my - vp.ty)/vp.scale;
  vp.scale = Math.min(Math.max(vp.scale*f, 0.12), 8);
  vp.tx = mx - wx*vp.scale;
  vp.ty = my - wy*vp.scale;
  applyVP();
}, {passive:false});

// ═══════════════════════════════
// HELPERS
// ═══════════════════════════════
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function colorDarken(hex, amt){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>Math.max(0,v-amt).toString(16).padStart(2,'0')).join('');
}

function colorText(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255 > 0.55 ? '#1a2d3a' : '#e8f4ff';
}

function wrapText(str, maxChars){
  if(!str) return [''];
  const words=str.split(' ');
  const lines=[];
  let cur='';
  words.forEach(w=>{
    const test=(cur+' '+w).trim();
    if(test.length>maxChars && cur){ lines.push(cur.trim()); cur=w; }
    else cur=test;
  });
  if(cur) lines.push(cur.trim());
  return lines.length ? lines : [''];
}

// EDIT MODAL
// ═══════════════════════════════
function openEdit(id){
  editId=id;
  const show=f=>document.getElementById(f).style.display='';
  const hide=f=>document.getElementById(f).style.display='none';
  ['f-desc','f-journal','f-doi','f-color','f-parent'].forEach(show);

  if(id==='__central'){
    document.getElementById('modal-ttl').textContent='Editar Nó Central';
    document.getElementById('ename').value=S.central.text;
    document.getElementById('edesc').value=S.central.sub||'';
    ['f-journal','f-doi','f-color','f-parent'].forEach(hide);
  } else {
    const meso=S.mesos.find(x=>x.id===id);
    const micro=S.micros.find(x=>x.id===id);
    const art=S.articles.find(x=>x.id===id);
    if(meso){
      document.getElementById('modal-ttl').textContent='Editar Driver Meso';
      document.getElementById('ename').value=meso.name;
      document.getElementById('edesc').value=meso.desc||'';
      ['f-journal','f-doi','f-parent'].forEach(hide);
      setEditColor(meso.color);
    } else if(micro){
      document.getElementById('modal-ttl').textContent='Editar Micro';
      document.getElementById('ename').value=micro.name;
      ['f-desc','f-journal','f-doi','f-color'].forEach(hide);
      document.getElementById('eparent').innerHTML=S.mesos.map(m=>`<option value="${m.id}"${m.id===micro.parent?' selected':''}>${m.name}</option>`).join('');
    } else if(art){
      document.getElementById('modal-ttl').textContent='Editar Artigo';
      document.getElementById('ename').value=art.ref;
      document.getElementById('ejournal').value=art.journal||'';
      document.getElementById('edoi').value=art.doi||'';
      ['f-desc','f-color'].forEach(hide);
      document.getElementById('eparent').innerHTML=S.mesos.map(m=>`<option value="${m.id}"${m.id===art.parent?' selected':''}>${m.name}</option>`).join('');
    }
  }
  document.getElementById('edit-modal').classList.add('open');
}
function setEditColor(hex){
  PC.edit=hex;
  document.querySelectorAll('#edit-swatches .csw').forEach(s=>s.classList.toggle('sel',s.dataset.c===hex));
}
function saveEdit(){
  const name=document.getElementById('ename').value.trim();
  if(!name){toast('Nome não pode ser vazio');return;}
  if(editId==='__central'){
    S.central.text=name; S.central.sub=document.getElementById('edesc').value.trim();
    document.getElementById('central-text').value=S.central.text;
    document.getElementById('central-sub').value=S.central.sub;
  } else {
    const meso=S.mesos.find(x=>x.id===editId);
    const micro=S.micros.find(x=>x.id===editId);
    const art=S.articles.find(x=>x.id===editId);
    if(meso){ meso.name=name; meso.desc=document.getElementById('edesc').value.trim(); meso.color=PC.edit; }
    else if(micro){ micro.name=name; micro.parent=document.getElementById('eparent').value; }
    else if(art){ art.ref=name; art.journal=document.getElementById('ejournal').value.trim(); art.doi=document.getElementById('edoi').value.trim(); art.parent=document.getElementById('eparent').value; }
  }
  closeModal(); render(); refreshSelects(); buildNodeList(); toast('Salvo');
}
function deleteNode(){
  if(editId==='__central'){toast('Não é possível deletar o nó central');return;}
  quickDel(editId); closeModal();
}
function closeModal(){ document.getElementById('edit-modal').classList.remove('open'); }

function refreshSelects(){
  ['micro-parent','art-parent'].forEach(sid=>{
    const sel=document.getElementById(sid), v=sel.value;
    sel.innerHTML=S.mesos.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
    if(v) sel.value=v;

}
function buildNodeList(){
  const list=document.getElementById('node-list');
  list.innerHTML='';
  addNI(list,S.central.text,S.central.sub,'bc','Central','__central',false,0);
  S.mesos.forEach(m=>{
    const mc=S.micros.filter(x=>x.parent===m.id).length;
    const ac=S.articles.filter(x=>x.parent===m.id).length;
    addNI(list,m.name,(m.desc?m.desc+' · ':'')+mc+' micro · '+ac+' art.','bm','Meso',m.id,true,0);
    S.micros.filter(x=>x.parent===m.id).forEach(mc=>addNI(list,mc.name,'','bmi','Micro',mc.id,true,14));
    S.articles.filter(x=>x.parent===m.id).forEach(a=>addNI(list,a.ref,a.journal||'','ba','Art.',a.id,true,14));
  });
}
function addNI(parent,label,sub,bc,bt,id,canDel,indent){
  const d=document.createElement('div');
  d.className='ni'; d.style.marginLeft=indent+'px';
  d.innerHTML=`<div><div class="ni-label">${label}</div>${sub?`<div class="ni-sub">${sub}</div>`:''}</div>
    <div style="display:flex;gap:4px;align-items:center">
      <span class="badge ${bc}">${bt}</span>
      ${canDel?`<button class="xbtn" onclick="event.stopPropagation();quickDel('${id}')">✕</button>`:''}
    </div>`;
  d.onclick=()=>openEdit(id);
  parent.appendChild(d);
}

  const r=new FileReader(); r.onload=ev=>{ try{ S=JSON.parse(ev.target.result); render(); refreshSelects(); buildNodeList(); toast('Importado!'); }catch{ toast('Erro no JSON'); } };
  r.readAsText(f); e.target.value='';
